---

exclude: ^(LICENSES/|releases.opml|VERSIONS.md|var/)

# See: https://pre-commit.com/hooks.html
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-merge-conflict
        args: ["--assume-in-merge"]
      - id: detect-private-key
      - id: check-json
      - id: check-shebang-scripts-are-executable
      - id: check-toml
      - id: trailing-whitespace
      - id: end-of-file-fixer
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        args: [
          --disable=MD001, # heading-increment
          --disable=MD013, # line-length
          --disable=MD025, # single-h1
          --disable=MD027, # no-multiple-space-blockquote
          --disable=MD033, # no-inline-html
          --disable=MD037, # no-space-in-emphasis
          --disable=MD040, # fenced-code-language
          --disable=MD041, # first-line-h1
          --disable=MD051, # link-fragments
          --disable=MD059  # descriptive-link-text
        ]
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
  - repo: https://github.com/fsfe/reuse-tool
    rev: v6.2.0
    hooks:
      - id: reuse
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
  - repo: https://github.com/ansible/ansible-lint
    rev: v26.4.0
    hooks:
      - id: ansible-lint
        files: '^roles/mash/'
        args: ['roles/mash']
        pass_filenames: false
        language_version: python3
