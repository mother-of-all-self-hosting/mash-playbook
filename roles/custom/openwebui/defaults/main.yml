---
# Project source code URL: https://github.com/open-webui/open-webui

openwebui_enabled: true

openwebui_identifier: openwebui
openwebui_base_path: "{{ mash_playbook_base_path }}/{{ openwebui_identifier }}"

# `openwebui_data_path` is used for storing data in mounted directories
openwebui_data_path: "{{ openwebui_base_path }}/data"

# renovate: datasource=docker depName=clusterzx/openwebui versioning=semver
openwebui_version: 0.7.2

openwebui_uid: ""
openwebui_gid: ""

openwebui_scheme: https

# The hostname at which OpenWebUI is served.
openwebui_hostname: ""

openwebui_timezone: UTC
openwebui_secret_key: ""
openwebui_admin_email: ""
openwebui_admin_password: ""
openwebui_default_locale: en

openwebui_openai_api_enabled: false
openwebui_openai_api_key: ""
openwebui_web_search_enabled: false
openwebui_web_search_engine: ""
openwebui_image_generation_enabled: false
openwebui_image_generation_engine: ""
openwebui_image_generation_model: ""
openwebui_image_generation_image_size: ""

# The path at which OpenWebUI is served.
# This value must either be `/` or not end with a slash (e.g. `/openwebui`).
#
# Hosting OpenWebUI under a subpath does not seem to be possible due to OpenWebUI's
# technical limitations.
openwebui_path_prefix: /

openwebui_container_image: "{{ openwebui_container_image_registry_prefix }}open-webui/open-webui:{{ openwebui_container_image_tag }}"
openwebui_container_image_tag: "{{ openwebui_version }}"
openwebui_container_image_registry_prefix: "{{ openwebui_container_image_registry_prefix_upstream }}"
openwebui_container_image_registry_prefix_upstream: "{{ openwebui_container_image_registry_prefix_upstream_default }}"
openwebui_container_image_registry_prefix_upstream_default: ghcr.io/
openwebui_container_image_force_pull: "{{ openwebui_container_image.endswith(':main') }}"

openwebui_container_image_self_build: false
openwebui_container_image_self_build_name: "open-webui/open-webui:{{ openwebui_container_image_self_build_repo_version }}"
openwebui_container_image_self_build_repo: "https://github.com/open-webui/open-webui.git"
openwebui_container_image_self_build_repo_version: "{{ openwebui_version if openwebui_version != 'latest' else 'main' }}"
openwebui_container_image_self_build_src_files_path: "{{ openwebui_base_path }}/docker-src"

# Controls whether the container exposes its HTTP port (tcp/80 in the container).
#
# Takes an "<ip>:<port>" or "<port>" value (e.g. "127.0.0.1:2586"), or empty string to not expose.
openwebui_container_http_host_bind_port: ""

# The base container network. It will be auto-created by this role if it doesn't exist already.
openwebui_container_network: "{{ openwebui_identifier }}"

# The port number in the container
openwebui_container_http_port: 8080

# A list of additional container networks that the container would be connected to.
# The role does not create these networks, so make sure they already exist.
# Use this to expose this container to another reverse proxy, which runs in a different container network.
openwebui_container_additional_networks: "{{ openwebui_container_additional_networks_auto + openwebui_container_additional_networks_custom }}"
openwebui_container_additional_networks_auto: []
openwebui_container_additional_networks_custom: []

# A list of additional "volumes" to mount in the container.
# This list gets populated dynamically at runtime. You can provide a different default value,
# if you wish to mount your own files into the container.
# Contains definition objects like this: `{"type": "bind", "src": "/outside", "dst": "/inside", "options": "readonly"}.
# See the `--mount` documentation for the `docker run` command.
openwebui_container_additional_volumes: "{{ openwebui_container_additional_volumes_auto + openwebui_container_additional_volumes_custom }}"
openwebui_container_additional_volumes_auto: []
openwebui_container_additional_volumes_custom: []

# openwebui_container_labels_traefik_enabled controls whether labels to assist a Traefik reverse-proxy will be attached to the container.
# See `../templates/labels.j2` for details.
#
# To inject your own other container labels, see `openwebui_container_labels_additional_labels`.
openwebui_container_labels_traefik_enabled: true
openwebui_container_labels_traefik_docker_network: "{{ openwebui_container_network }}"
openwebui_container_labels_traefik_hostname: "{{ openwebui_hostname }}"
# The path prefix must either be `/` or not end with a slash (e.g. `/openwebui`).
openwebui_container_labels_traefik_path_prefix: "{{ openwebui_path_prefix }}"
openwebui_container_labels_traefik_rule: "Host(`{{ openwebui_container_labels_traefik_hostname }}`){% if openwebui_container_labels_traefik_path_prefix != '/' %} && PathPrefix(`{{ openwebui_container_labels_traefik_path_prefix }}`){% endif %}"
openwebui_container_labels_traefik_priority: 0
openwebui_container_labels_traefik_entrypoints: web-secure
openwebui_container_labels_traefik_tls: "{{ openwebui_container_labels_traefik_entrypoints != 'web' }}"
openwebui_container_labels_traefik_tls_certResolver: default  # noqa var-naming

# Controls which additional headers to attach to all HTTP requests.
# To add your own custom request headers, use `openwebui_container_labels_traefik_additional_request_headers_custom`
openwebui_container_labels_traefik_additional_request_headers: "{{ openwebui_container_labels_traefik_additional_request_headers_auto | combine(openwebui_container_labels_traefik_additional_request_headers_custom) }}"
openwebui_container_labels_traefik_additional_request_headers_auto: {}
openwebui_container_labels_traefik_additional_request_headers_custom: {}

# Controls which additional headers to attach to all HTTP responses.
# To add your own custom response headers, use `openwebui_container_labels_traefik_additional_response_headers_custom`
openwebui_container_labels_traefik_additional_response_headers: "{{ openwebui_container_labels_traefik_additional_response_headers_auto | combine(openwebui_container_labels_traefik_additional_response_headers_custom) }}"
openwebui_container_labels_traefik_additional_response_headers_auto: |
  {{
    {}
    | combine ({'X-XSS-Protection': openwebui_http_header_xss_protection} if openwebui_http_header_xss_protection else {})
    | combine ({'X-Content-Type-Options': openwebui_http_header_content_type_options} if openwebui_http_header_content_type_options else {})
    | combine ({'Content-Security-Policy': openwebui_http_header_content_security_policy} if openwebui_http_header_content_security_policy else {})
    | combine ({'Permissions-Policy': openwebui_http_header_permissions_policy} if openwebui_http_header_permissions_policy else {})
    | combine ({'Strict-Transport-Security': openwebui_http_header_strict_transport_security} if openwebui_http_header_strict_transport_security and openwebui_container_labels_traefik_tls else {})
  }}
openwebui_container_labels_traefik_additional_response_headers_custom: {}

# openwebui_container_labels_additional_labels contains a multiline string with additional labels to add to the container label file.
# See `../templates/labels.j2` for details.
# To add your own custom labels, use `openwebui_container_labels_additional_labels_custom`
#
# Example:
# openwebui_container_labels_additional_labels_custom:
#   - my.label=1
#   - another.label="here"
openwebui_container_labels_additional_labels: "{{ openwebui_container_labels_additional_labels_auto + openwebui_container_labels_additional_labels_custom }}"
openwebui_container_labels_additional_labels_auto: []
openwebui_container_labels_additional_labels_custom: []

# A list of extra arguments to pass to the container (`docker create` command)
openwebui_container_extra_arguments: "{{ openwebui_container_extra_arguments_auto + openwebui_container_extra_arguments_custom }}"
openwebui_container_extra_arguments_auto: []
openwebui_container_extra_arguments_custom: []

# Specifies the value of the `X-XSS-Protection` header
# Stops pages from loading when they detect reflected cross-site scripting (XSS) attacks.
#
# Learn more about it is here:
# - https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-XSS-Protection
# - https://portswigger.net/web-security/cross-site-scripting/reflected
openwebui_http_header_xss_protection: "1; mode=block"

# Specifies the value of the `X-Content-Type-Options` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-Content-Type-Options
openwebui_http_header_content_type_options: nosniff

# Specifies the value of the `Content-Security-Policy` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy
openwebui_http_header_content_security_policy: frame-ancestors 'self'

# Specifies the value of the `Permissions-Policy` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Permissions-Policy
openwebui_http_header_permissions_policy: "{{ 'interest-cohort=()' if openwebui_floc_optout_enabled else '' }}"

# Specifies the value of the `Strict-Transport-Security` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security
openwebui_http_header_strict_transport_security: "max-age=31536000; includeSubDomains{{ '; preload' if openwebui_hsts_preload_enabled else '' }}"

# Controls whether to send a "Permissions-Policy interest-cohort=();" header along with all responses
#
# Learn more about what it is here:
# - https://www.eff.org/deeplinks/2021/03/googles-floc-terrible-idea
# - https://paramdeo.com/blog/opting-your-website-out-of-googles-floc-network
# - https://amifloced.org/
#
# Of course, a better solution is to just stop using browsers (like Chrome), which participate in such tracking practices.
# See: `openwebui_http_header_permissions_policy`
openwebui_floc_optout_enabled: true

# Controls if HSTS preloading is enabled
#
# In its strongest and recommended form, the [HSTS policy](https://www.chromium.org/hsts) includes all subdomains, and
# indicates a willingness to be "preloaded" into browsers:
# `Strict-Transport-Security: max-age=31536000; includeSubDomains; preload`
# For more information visit:
# - https://en.wikipedia.org/wiki/HTTP_Strict_Transport_Security
# - https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security
# - https://hstspreload.org/#opt-in
# See: `openwebui_http_header_strict_transport_security`
openwebui_hsts_preload_enabled: false

# List of systemd services that the OpenWebUI systemd service depends on
openwebui_systemd_required_services_list: "{{ openwebui_systemd_required_services_list_default + openwebui_systemd_required_services_list_auto + openwebui_systemd_required_services_list_custom }}"
openwebui_systemd_required_services_list_default: "{{ [devture_systemd_docker_base_docker_service_name] if devture_systemd_docker_base_docker_service_name else [] }}"
openwebui_systemd_required_services_list_auto: []
openwebui_systemd_required_services_list_custom: []

# List of systemd services that the OpenWebUI systemd service wants
openwebui_systemd_wanted_services_list: "{{ openwebui_systemd_wanted_services_list_default + openwebui_systemd_wanted_services_list_auto + openwebui_systemd_wanted_services_list_custom }}"
openwebui_systemd_wanted_services_list_default: []
openwebui_systemd_wanted_services_list_auto: []
openwebui_systemd_wanted_services_list_custom: []

openwebui_environment_variables_tz: UTC

# Additional environment variables.
openwebui_environment_variables_additional_variables: ""
